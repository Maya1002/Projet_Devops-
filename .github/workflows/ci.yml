name: Java CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build et tests
        run: mvn -f ndarray/pom.xml clean verify

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t ndarray .

      - name: Run container Docker
        run: docker run ndarray